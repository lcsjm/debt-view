<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2B4B" /> <!-- Experian Navy -->
      <stop offset="100%" stop-color="#1D4F91" /> <!-- Experian Dark Blue -->
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="24" fill="url(#bg)" />
  
  <!-- Letra D - Transparente/Branco -->
